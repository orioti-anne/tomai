{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">

    <div class="w-full max-w-md bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">

        <div class="text-center mb-6">
            <div class="flex justify-center mb-3">
                <div class="w-12 h-12 bg-green-600 rounded-xl flex items-center justify-center text-white">
                    <i data-lucide="leaf" class="w-6 h-6"></i>
                </div>
            </div>
            <h1 class="text-xl font-bold text-gray-800">tomAI</h1>
            <p class="text-sm text-gray-400 mt-1">계정에 로그인하세요</p>
        </div>

        <form method="post">
            {{ form.csrf_token }}

            {% include "form_errors.html" %}

            <div class="mb-5">
                <label for="username" class="block text-sm font-semibold text-gray-600 mb-2">
                    아이디
                </label>
                <input type="text"
                       name="username"
                       id="username"
                       value="{{ form.username.data or '' }}"
                       placeholder="아이디 입력"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-6">
                <label for="password" class="block text-sm font-semibold text-gray-600 mb-2">
                    비밀번호
                </label>
                <input type="password"
                       name="password"
                       id="password"
                       placeholder="비밀번호 입력"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <!-- 로그인 버튼 -->
            <button type="submit"
                    class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold flex items-center justify-center gap-2 shadow-sm transition">
                <i data-lucide="log-in" class="w-4 h-4"></i>
                로그인
            </button>

        </form>

        <div class="text-center mt-6 text-sm text-gray-400">
            계정이 없으신가요?
            <a href="{{ url_for('auth.signup') }}" class="text-green-600 hover:underline font-medium">회원가입</a>
        </div>

    </div>

</div>

{% endblock %}
