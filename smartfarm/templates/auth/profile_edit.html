{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-10">

    <div class="w-full max-w-lg bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">

        <div class="text-center mb-6">
            <div class="flex justify-center mb-3">
                <div class="w-12 h-12 bg-green-600 rounded-xl flex items-center justify-center text-white">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                </div>
            </div>
            <h1 class="text-xl font-bold text-gray-800">회원정보 수정</h1>
            <p class="text-sm text-gray-400 mt-1">내 정보를 수정할 수 있습니다</p>
        </div>

        <form method="post">
            {{ form.csrf_token }}

            {% include "form_errors.html" %}

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">아이디</label>
                <input type="text" name="username"
                       value="{{ form.username.data or user.username or '' }}"
                       readonly
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-100 text-gray-500 cursor-not-allowed">
                <p class="text-xs text-gray-400 mt-1">아이디는 변경할 수 없습니다.</p>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">성함</label>
                <input type="text" name="name"
                       value="{{ form.name.data or user.name or '' }}"
                       placeholder="성함을 입력하세요"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">휴대전화</label>
                <input type="text" name="phone"
                       value="{{ form.phone.data or user.phone or '' }}"
                       placeholder="010-0000-0000"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">이메일</label>
                <input type="email" name="email"
                       value="{{ form.email.data or user.email or '' }}"
                       placeholder="example@email.com"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-600 mb-2">주소</label>
                <input type="text" name="address"
                       value="{{ form.address.data or user.address or '' }}"
                       placeholder="자택 주소 입력"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="border-t border-gray-200 my-6"></div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">새 비밀번호</label>
                <input type="password" name="password1"
                       placeholder="변경할 경우만 입력"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-600 mb-2">새 비밀번호 확인</label>
                <input type="password" name="password2"
                       placeholder="비밀번호 재입력"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="flex gap-3">
                <a href="{{ url_for('main.index') }}"
                   class="w-1/3 py-3 border border-gray-200 text-gray-600 rounded-lg font-semibold flex items-center justify-center hover:bg-gray-50 transition">
                    취소
                </a>

                <button type="submit"
                        class="w-2/3 py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold flex items-center justify-center gap-2 shadow-sm transition">
                    <i data-lucide="check" class="w-4 h-4"></i>
                    회원정보 저장
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
