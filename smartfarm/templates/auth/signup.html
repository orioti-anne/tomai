{% extends 'base.html' %}
{% block content %}
<div class="container my-3">
  <h4 class="border-bottom pb-2">회원가입</h4>
  <form method="post" class="post-form">
    {{ form.csrf_token }}
    {% include "form_errors.html" %}

    <div class="mb-3">
      <label for="username">사용자 아이디</label>
      <input type="text" class="form-control" name="username" id="username"
             value="{{ form.username.data or '' }}" placeholder="로그인에 사용할 아이디를 입력하세요">
    </div>

    <div class="mb-3">
      <label for="password1">비밀번호</label>
      <input type="password" class="form-control" name="password1" id="password1"
             value="{{ form.password1.data or '' }}">
    </div>

    <div class="mb-3">
      <label for="password2">비밀번호 확인</label>
      <input type="password" class="form-control" name="password2" id="password2"
             value="{{ form.password2.data or '' }}">
    </div>

    <hr> <div class="mb-3">
      <label for="name">성함</label>
      <input type="text" class="form-control" name="name" id="name"
             value="{{ form.name.data or '' }}" placeholder="실명을 입력하세요">
    </div>

    <div class="mb-3">
      <label for="phone">휴대전화</label>
      <input type="text" class="form-control" name="phone" id="phone"
             value="{{ form.phone.data or '' }}" placeholder="010-0000-0000">
      <small class="text-muted">중복 가입 방지를 위해 정확히 입력해 주세요.</small>
    </div>

    <div class="mb-3">
      <label for="email">이메일</label>
      <input type="email" class="form-control" name="email" id="email"
             value="{{ form.email.data or '' }}" placeholder="example@email.com">
    </div>

    <div class="mb-3">
      <label for="address">주소</label>
      <input type="text" class="form-control" name="address" id="address"
             value="{{ form.address.data or '' }}" placeholder="자택 주소를 입력하세요">
    </div>

    <button type="submit" class="btn btn-primary w-100 mt-3">회원가입 완료</button>
  </form>
</div>
{% endblock %}
