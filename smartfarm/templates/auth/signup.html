{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">

    <div class="w-full max-w-lg bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">

        <div class="text-center mb-6">

            <div class="flex justify-center mb-3">
                <div class="w-12 h-12 bg-green-600 rounded-xl flex items-center justify-center text-white">
                    <i data-lucide="user-plus" class="w-6 h-6"></i>
                </div>
            </div>
            <h1 class="text-xl font-bold text-gray-800">회원가입</h1>
            <p class="text-sm text-gray-400 mt-1">새로운 계정을 생성하세요</p>
            <div class="flex justify-center gap-2 mt-4">
                <div class="h-1.5 w-12 bg-green-600 rounded-full"></div>
                <div class="h-1.5 w-8 bg-gray-200 rounded-full"></div>
                <div class="h-1.5 w-8 bg-gray-200 rounded-full"></div>
            </div>
        </div>

        <form method="post">
            {{ form.csrf_token }}

            {% include "form_errors.html" %}

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">아이디 <span class="text-red-500">*</span></label>
                <input type="text" name="username"
                       value="{{ form.username.data or '' }}"
                       placeholder="로그인 아이디"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">비밀번호 <span class="text-red-500">*</span></label>
                <input type="password" name="password1"
                       placeholder="비밀번호 입력"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-600 mb-2">비밀번호 확인 <span class="text-red-500">*</span></label>
                <input type="password" name="password2"
                       placeholder="비밀번호 재입력"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="border-t border-gray-200 my-6"></div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">성함 <span class="text-red-500">*</span></label>
                <input type="text" name="name"
                       value="{{ form.name.data or '' }}"
                       placeholder="성함을 입력하세요"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">휴대전화 <span class="text-red-500">*</span></label>
                <input type="text" name="phone"
                       value="{{ form.phone.data or '' }}"
                       placeholder="010-0000-0000"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
                <p class="text-xs text-gray-400 mt-1">중복 가입 방지를 위해 정확히 입력해주세요.</p>
            </div>

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">이메일</label>
                <input type="email" name="email"
                       value="{{ form.email.data or '' }}"
                       placeholder="example@email.com"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-600 mb-2">주소</label>
                <input type="text" name="address"
                       value="{{ form.address.data or '' }}"
                       placeholder="자택 주소 입력"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <button type="submit"
                    class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold flex items-center justify-center gap-2 shadow-sm transition">
                <i data-lucide="check" class="w-4 h-4"></i>
                회원가입 완료
            </button>

        </form>

        <div class="text-center mt-6 text-sm text-gray-400">
            이미 계정이 있으신가요?
            <a href="{{ url_for('auth.login') }}"
               class="text-green-600 hover:underline font-medium">
                로그인
            </a>
        </div>

    </div>

</div>

{% endblock %}
