{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
    <div class="w-full max-w-lg bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">

        <div class="text-center mb-8">
            <div class="flex justify-center mb-3">
                <div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center text-green-600">
                    <i data-lucide="sprout" class="w-6 h-6"></i>
                </div>
            </div>
            <h1 class="text-xl font-bold text-gray-800">농가 정보 등록</h1>
            <p class="text-sm text-gray-400 mt-2">환영합니다! 스마트팜 관리를 위해<br> 농가 정보를 입력해 주세요.</p>

            <div class="flex justify-center gap-2 mt-4">
                <div class="h-1.5 w-8 bg-gray-200 rounded-full"></div>
                <div class="h-1.5 w-12 bg-green-600 rounded-full"></div>
                <div class="h-1.5 w-8 bg-gray-200 rounded-full"></div>
            </div>
        </div>

        <form method="post" id="farmForm">
            {{ form.csrf_token }}
            {% include "form_errors.html" %}

            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-600 mb-2">농가 이름 <span class="text-red-500">*</span></label>
                <input type="text" name="farm_name" id="farm_name"
                       value="{{ form.farm_name.data or '' }}"
                       placeholder="예: 푸른들 농장"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="grid grid-cols-2 gap-4 mb-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">지역 (시/도) <span class="text-red-500">*</span></label>
                    <select name="region_l1" id="region_l1"
                            class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
                        <option value="">시/도 선택</option>
                        </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-2">지역 (시/군/구) <span class="text-red-500">*</span></label>
                    <select name="region_l2" id="region_l2"
                            class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
                        <option value="">시/군/구 선택</option>
                    </select>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-semibold text-gray-600 mb-2">총 면적 (3.3㎡) <span class="text-red-500">*</span></label>
                <div class="relative">
                    <input type="number" step="0.01" name="total_area"
                           value="{{ form.total_area.data or '' }}"
                           placeholder="0.00"
                           class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
                    <span class="absolute right-3 top-3 text-gray-400 text-sm">평</span>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button type="submit"
                        class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-lg font-semibold flex items-center justify-center gap-2 shadow-sm transition">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    농가 등록 완료
                </button>

                <a href="{{ url_for('main.index') }}"
                   class="w-full py-3 bg-white border border-gray-200 text-gray-500 rounded-lg font-medium text-center hover:bg-gray-50 transition text-sm">
                    나중에 등록하기 (메인으로)
                </a>
            </div>
        </form>
    </div>
</div>

<script>

const areaData = {
    "서울": ["강남", "강동", "강북", "강서", "관악", "광진", "구로", "금천", "노원", "도봉", "동대문", "동작", "마포", "서대문", "서초", "성동", "성북", "송파", "양천", "영등포", "용산", "은평", "종로", "중", "중랑"],
    "부산": ["강서", "금정", "기장", "남", "동", "동래", "부산진", "북", "사상", "사하", "서", "수영", "연제", "영도", "중", "해운대"],
    "대구": ["남", "달서", "달성", "동", "북", "서", "수성", "중", "군위"],
    "인천": ["강화", "계양", "미추홀", "남동", "동", "부평", "서", "연수", "옹진", "중"],
    "광주": ["광산", "남", "동", "북", "서"],
    "대전": ["대덕", "동", "서", "유성", "중"],
    "울산": ["남", "동", "북", "울주", "중"],
    "세종": ["세종"],
    "경기": ["수원", "고양", "용인", "성남", "부천", "화성", "안산", "남양주", "안양", "평택", "시흥", "파주", "의정부", "김포", "광주", "광명", "군포", "하남", "오산", "양주", "이천", "구리", "안성", "포천", "의왕", "양평", "여주", "동두천", "가평", "과천", "연천"],
    "강원": ["춘천", "원주", "강릉", "동해", "태백", "속초", "삼척", "홍천", "횡성", "영월", "평창", "정선", "철원", "화천", "양구", "인제", "고성", "양양"],
    "충북": ["청주", "충주", "제천", "보은", "옥천", "영동", "증평", "진천", "괴산", "음성", "단양"],
    "충남": ["천안", "공주", "보령", "아산", "서산", "논산", "계룡", "당진", "금산", "부여", "서천", "청양", "홍성", "예산", "태안"],
    "전북": ["전주", "군산", "익산", "정읍", "남원", "김제", "완주", "진안", "무주", "장수", "임실", "순창", "고창", "부안"],
    "전남": ["목포", "여수", "순천", "나주", "광양", "담양", "곡성", "구례", "고흥", "보성", "화순", "장흥", "강진", "해남", "영암", "무안", "함평", "영광", "장성", "완도", "진도", "신안"],
    "경북": ["포항", "경주", "김천", "안동", "구미", "영주", "영천", "상주", "문경", "경산", "의성", "청송", "영양", "영덕", "청도", "고령", "성주", "칠곡", "예천", "봉화", "울진", "울릉"],
    "경남": ["창원", "진주", "통영", "사천", "김해", "밀양", "거제", "양산", "의령", "함안", "창녕", "고성", "남해", "하동", "산청", "함양", "거창", "합천"],
    "제주": ["제주", "서귀포"]
};

document.addEventListener('DOMContentLoaded', function() {
    const l1Select = document.getElementById('region_l1');
    const l2Select = document.getElementById('region_l2');

    Object.keys(areaData).forEach(city => {
        const option = document.createElement('option');
        option.value = city;
        option.textContent = city;
        l1Select.appendChild(option);
    });

    l1Select.addEventListener('change', function() {
        const selectedL1 = this.value;
        l2Select.innerHTML = '<option value="">시/군/구 선택</option>';

        if (areaData[selectedL1]) {
            areaData[selectedL1].forEach(l2 => {
                const option = document.createElement('option');
                option.value = l2;
                option.textContent = l2;
                l2Select.appendChild(option);
            });
        }
    });
});
</script>

{% endblock %}
