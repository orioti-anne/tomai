<header class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white/80 backdrop-blur-md">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">
        <div class="flex items-center gap-8">
            <a href="{{ url_for('main.index') }}" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-green-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-green-200 group-hover:scale-105 transition-transform">
                    <i data-lucide="sprout"></i>
                </div>
                <span class="text-xl font-bold text-green-600 tracking-tight">tomAI</span>
            </a>

            <nav class="hidden lg:flex items-center gap-1">
                <a href="/dashboard" class="px-2.5 py-1.5 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-green-600 transition-colors">대시보드</a>
                <a href="/prediction" class="px-2.5 py-1.5 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-green-600 transition-colors">생산예측</a>
                <a href="/growth" class="px-2.5 py-1.5 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-green-600 transition-colors">생육분석</a>
                <a href="/monitoring" class="px-2.5 py-1.5 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-green-600 transition-colors">환경제어</a>
                <a href="/vision" class="px-2.5 py-1.5 rounded-lg text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-green-600 transition-colors">Vision</a>
            </nav>
        </div>

        <div class="hidden lg:flex items-center gap-4">
            <div class="relative group">
                <button class="flex items-center gap-1.5 text-xs font-semibold text-slate-500 border border-slate-200 px-3 py-1.5 rounded-lg hover:border-blue-300 hover:text-blue-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    Chat
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3 text-slate-400 group-hover:rotate-180 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="absolute right-0 mt-1 w-36 bg-white border border-slate-100 rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 overflow-hidden">
                    <a href="/chat" class="flex items-center gap-2 px-4 py-3 text-xs font-semibold text-slate-600 hover:bg-green-50 hover:text-green-700 transition-colors border-b border-slate-50">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                        토마토 재배 상담
                    </a>
                    <a href="/slm" class="flex items-center gap-2 px-4 py-3 text-xs font-semibold text-slate-600 hover:bg-indigo-50 hover:text-indigo-700 transition-colors">
                        <span class="w-1.5 h-1.5 rounded-full bg-indigo-500"></span>
                        종합 비서
                    </a>
                </div>
            </div>
            {% if g.user %}
            <div class="relative group">
                <button class="flex items-center gap-3 bg-slate-50 px-4 py-2 rounded-full border border-slate-100 hover:bg-white hover:shadow-md transition-all cursor-pointer">
                    <div class="w-7 h-7 bg-green-100 rounded-full flex items-center justify-center text-green-700">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </div>
                    <span class="text-sm font-bold text-slate-700">{{ g.user.username }}님</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 group-hover:rotate-180 transition-transform"></i>
                </button>

                <div class="absolute right-0 mt-2 w-48 bg-white border border-slate-100 rounded-2xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 overflow-hidden">
                    <div class="py-2">
                        <a href="{{ url_for('auth.profile_edit') }}" class="flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 hover:text-green-600 transition-colors">
                            <i data-lucide="settings" class="w-4 h-4"></i>
                            <span>회원정보</span>
                        </a>
                        <a href="{{ url_for('farm.list') }}" class="flex items-center gap-3 px-4 py-3 text-sm text-slate-600 hover:bg-slate-50 hover:text-green-600 transition-colors border-b border-slate-50">
                            <i data-lucide="layout-grid" class="w-4 h-4"></i>
                            <span>농가관리</span>
                        </a>
                        <a href="{{ url_for('auth.logout') }}" class="flex items-center gap-3 px-4 py-3 text-sm text-red-500 hover:bg-red-50 transition-colors">
                            <i data-lucide="log-out" class="w-4 h-4"></i>
                            <span>로그아웃</span>
                        </a>
                    </div>
                </div>
            </div>
            {% else %}
            <div class="flex items-center gap-2">
                <a href="{{ url_for('auth.login') }}" class="text-xs font-semibold text-slate-600 px-3 py-1.5">로그인</a>
                <a href="{{ url_for('auth.signup') }}" class="text-xs font-semibold bg-green-600 text-white px-3 py-1.5 rounded-lg hover:bg-green-700 shadow-md shadow-green-100">시작하기</a>
            </div>
            {% endif %}
        </div>

        <button class="lg:hidden p-2 text-slate-600" onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
            <i data-lucide="menu"></i>
        </button>
    </div>

    <div id="mobile-menu" class="hidden lg:hidden bg-white border-t border-slate-200 shadow-inner">
        <div class="px-4 py-6 flex flex-col gap-2">
            <a href="/dashboard" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 hover:bg-slate-50 font-medium">대시보드</a>
            <a href="/prediction" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 hover:bg-slate-50 font-medium">생산예측</a>
            <a href="/growth" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 hover:bg-slate-50 font-medium">생육분석</a>
            <a href="/monitoring" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 hover:bg-slate-50 font-medium border-b border-slate-50">환경제어</a>
            <a href="/vision" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 hover:bg-slate-50 font-medium">Vision</a>
            <span class="px-3 pt-2 pb-1 text-xs font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1.5"><svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</span>
            <a href="/chat" class="flex items-center gap-3 pl-6 pr-3 py-2.5 rounded-xl text-slate-500 hover:bg-green-50 hover:text-green-700 font-medium">
                <span class="w-2 h-2 rounded-full bg-green-500"></span>
                토마토 재배 상담
            </a>
            <a href="/slm" class="flex items-center gap-3 pl-6 pr-3 py-2.5 rounded-xl text-slate-500 hover:bg-indigo-50 hover:text-indigo-700 font-medium">
                <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
                종합 비서
            </a>


            {% if g.user %}
            <div class="mt-4 pt-4 border-t border-slate-100 flex flex-col gap-2">
                <span class="px-3 text-xs font-bold text-slate-400 uppercase tracking-wider">내 계정</span>
                <a href="{{ url_for('auth.profile_edit') }}" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 hover:bg-slate-50 font-medium">
                    <i data-lucide="settings" class="w-5 h-5"></i> 회원정보
                </a>
                <a href="{{ url_for('farm.list') }}" class="flex items-center gap-3 p-3 rounded-xl text-slate-600 hover:bg-slate-50 font-medium">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> 농가관리
                </a>
                <a href="{{ url_for('auth.logout') }}" class="flex items-center gap-3 p-3 rounded-xl text-red-500 hover:bg-red-50 font-medium">
                    <i data-lucide="log-out" class="w-5 h-5"></i> 로그아웃
                </a>
            </div>
            {% else %}
            <div class="mt-4 flex flex-col gap-2">
                <a href="{{ url_for('auth.login') }}" class="w-full py-3 text-center font-bold text-slate-600 border border-slate-200 rounded-xl">로그인</a>
                <a href="{{ url_for('auth.signup') }}" class="w-full py-3 text-center font-bold text-white bg-green-600 rounded-xl">시작하기</a>
            </div>
            {% endif %}
        </div>
    </div>
</header>
