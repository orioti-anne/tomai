{% extends 'base.html' %}
{% block content %}

<div class="p-8 bg-gray-50 min-h-screen max-w-3xl mx-auto">

    <!-- 🔹 헤더 -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">질문 등록</h1>
        <p class="text-gray-400 mt-2">궁금한 내용을 작성해주세요.</p>
    </div>

    <!-- 🔹 카드 -->
    <div class="bg-white border border-gray-200 rounded-2xl p-8 shadow-sm">

        <form method="post">
            {{ form.csrf_token }}

            <!-- 🔸 에러 메시지 -->
            {% for field, errors in form.errors.items() %}
            <div class="mb-4 text-sm text-red-500">
                <strong>{{ form[field].label }}</strong> : {{ ', '.join(errors) }}
            </div>
            {% endfor %}

            <!-- 🔸 제목 -->
            <div class="mb-6">
                <label for="subject" class="block text-sm font-semibold text-gray-600 mb-2">
                    제목
                </label>
                <input type="text"
                       name="subject"
                       id="subject"
                       value="{{ form.subject.data or '' }}"
                       placeholder="제목을 입력해주세요"
                       class="w-full p-3 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <!-- 🔸 내용 -->
            <div class="mb-6">
                <label for="content" class="block text-sm font-semibold text-gray-600 mb-2">
                    내용
                </label>
                <textarea name="content"
                          id="content"
                          rows="6"
                          placeholder="내용을 입력해주세요"
                          class="w-full p-4 border border-gray-200 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-green-500 resize-none">{{ form.content.data or '' }}</textarea>
            </div>

            <!-- 🔸 버튼 -->
            <div class="flex justify-end gap-3">

                <button type="button"
                        onclick="history.back()"
                        class="px-4 py-2 text-sm text-gray-500 hover:bg-gray-100 rounded-lg">
                    취소
                </button>

                <button type="submit"
                        class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-semibold rounded-lg shadow-sm flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i>
                    저장하기
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
