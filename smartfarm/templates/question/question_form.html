{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h5 class="my-3 border-bottom pb-2">질문 등록</h5>
  <form method="post" class="post-form my-3">

    {{ form.csrf_token }}

    {% for field, errors in form.errors.items() %}
    <div class="alert alert-danger" role="alert">
      <strong> {{form[field].label}}</strong>: {{','.join(errors) }}
    </div>
    {% endfor %}
    <div class="form-group">
      <label for="subject">제목</label>
      <input type="text" class="form-control" name="subject" id="subject" value="{{form.subject.data or ''}}">
    </div>

    <div class="form-group">
      <label for="content">내용</label>
      <textarea type="text" class="form-control" name="content" id="content" rows="5">{{form.content.data or ''}}</textarea>
    </div>

<!--    <div class="mb-3">-->
<!--      {{ form.subject.label(class="form-label") }}-->
<!--      {{ form.subject(class="form-control") }}-->
<!--    </div>-->

<!--    <div class="mb-3">-->
<!--      {{ form.content.label(class="form-label") }}-->
<!--      {{ form.content(class="form-control", rows="5") }}-->
<!--    </div>-->

    <button type="submit" class="btn btn-primary">저장하기</button>
    <button type="button" onclick="history.back()" class="btn">back</button>
  </form>
</div>

{% endblock %}
