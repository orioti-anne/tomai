<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTful test</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <style>
        :root {
            --primary-color: #1d9387;
            --bg-color: #f3f4f6;
            --text-color: #1f2937;
            --border-color: #e5e7eb;
            --danger-color: #ef4444;
        }

        body {
            /* 2. 폰트 적용: Noto Sans KR */
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 50px 20px;
            -webkit-font-smoothing: antialiased; /* 글자를 더 매끄럽게 */
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 1.8rem;
            margin-bottom: 40px;
            letter-spacing: -0.02em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            font-family: inherit; /* 부모인 Noto Sans 상속 */
            font-size: 13px;
            transition: all 0.2s ease;
        }

        textarea {
            height: 100px;
            resize: none; /* 깔끔함을 위해 높이 조절 비활성화 (선택 사항) */
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }

        button:active {
            transform: scale(0.98); /* 클릭 시 눌리는 효과 */
        }

        button:hover {
            background-color: #000000;
        }

        #content-area ul {
            list-style: none;
            padding: 0;
        }

        #content-area li {
            background: white;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            /* 삭제 버튼 배치를 위해 flex 사용 */
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #content-area li:hover{
            border-color: var(--primary-color);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        /* 번호와 제목 정렬 */
        #content-area li a {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 0; /* 번호와 제목 사이 간격 */
        }

        .post-num {
            font-size: 0.85rem;
            margin: 0 20px;
            color: #a6a6a6; /* 약간 흐린 회색으로 번호 표시 */
            font-weight: 600;
            min-width: 20px; /* 번호 자릿수가 바뀌어도 제목 위치 고정 */
        }

        .post-subject {
            flex-grow: 1; /* 제목이 남은 공간 다 쓰게 */
            font-size: 0.8rem;
        }

        .delete-btn, .edit-btn {
            background: none;
            border: none;
            color: #ccc;
            padding: 10px 5px;
            cursor: pointer;
            transition: color 0.2s;
            width: auto;
        }

        .write-btn .material-symbols-outlined,
        .edit-btn .material-symbols-outlined,
        .delete-btn .material-symbols-outlined {
            font-size: 1rem;
            font-variation-settings: 'wght' 300;
        }
        .edit-btn:hover, .delete-btn:hover {
            color: var(--text-color);
            background: none;
        }

        .action-btns {
            display: flex;
            gap: 0;
            align-items: center;
            margin-right: 10px;
        }
        .write-btn-wrapper {
            display: flex;
            justify-content: flex-end; /* 오른쪽 정렬 */
            margin-top: 20px;
        }

        .write-btn {
            width: auto;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: #c5c5c5;
            border-radius: 10px;
            font-weight: 500;
        }

        .write-btn:hover {
            background-color: #248f84;
        }
        .no-data {
            text-align: center;
            color: #6b7280;
            margin-top: 60px;
        }


        /* 모달 배경 */
        .modal {
            display: none; /* 기본은 숨김 */
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); /* 반투명 검정 */
            backdrop-filter: blur(3px); /* 배경 흐림 효과 (최신 트렌드) */
        }

        /* 모달 박스 */
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .save-btn { background-color: var(--primary-color); }
        .cancel-btn { background-color: #94a3b8; }
        .cancel-btn:hover { background-color: #64748b; }
        .sr-only {font-size: 0.8rem; margin-left: 8px;}

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 30px 0;
        }

        .page-btn {
            width: auto; /* 기본 버튼 100% 스타일 해제 */
            padding: 10px;
            color: var(--text-color);
            background-color: var(--bg-color);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .page-btn:hover {
            color: #686868;
            background-color: var(--bg-color);
        }

        .page-btn.active {
            color: var(--primary-color);
            background-color: var(--bg-color);
            font-weight: bold;
            font-size: 15px;
        }

        .page-btn:disabled {
            color: #fff;
            cursor: not-allowed;
         }

    </style>
</head>
<body>

<div class="container">
    <h2>질문 게시판</h2>
    <div id="content-area"></div>

    <div id="pagination-area" class="pagination"></div>

    <div class="write-btn-wrapper">
        <button onclick="openCreateModal()" class="write-btn">
            <span class="material-symbols-outlined">edit_square</span> Write
        </button>
    </div>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <h2>질문 등록</h2>
            <div class="input-group">
                <label for="subject" class="sr-only">제목</label>
                <input type="text" id="subject" placeholder="제목을 입력하세요">
            </div>
            <div class="input-group">
                <label for="content" class="sr-only">내용</label>
                <textarea id="content" placeholder="궁금한 내용을 상세히 적어주세요"></textarea>
            </div>
            <div class="modal-buttons">
                <button onclick="createQuestion()" class="save-btn">등록하기</button>
                <button onclick="closeModal()" class="cancel-btn">취소</button>
            </div>
        </div>
    </div>


    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>질문 수정</h2>
            <input type="hidden" id="edit-id"> <div class="input-group">
                <label for="edit-subject" class="sr-only">제목</label>
                <input type="text" id="edit-subject" placeholder="제목">
            </div>
            <div class="input-group">
                <label for="edit-content" class="sr-only">내용</label>
                <textarea id="edit-content" placeholder="내용"></textarea>
            </div>
            <div class="modal-buttons">
                <button onclick="updateQuestion()" class="save-btn">저장하기</button>
                <button onclick="closeModal()" class="cancel-btn">취소</button>
            </div>
        </div>
    </div>



</div>

<script>
    const API_URL = '/questionpractice/';

    let currentPage = 1; // 현재 페이지 기억

    // 1. 목록 로드 함수 (기본값 1페이지)
    async function loadQuestions(page = 1) {
        currentPage = page;
        try {
            const response = await fetch(`${API_URL}?page=${page}`);
            const data = await response.json();

            renderList(data);
            renderPagination(data);

        } catch (error) {
            console.error("데이터 로딩 실패:", error);
        }
    }

    // 2. 게시글 목록 렌더링
    /**
     * @param {Object} data
     * @param {Array} data.questions
     * @param {number} data.total_pages
     * @param {number} data.current_page
     * @param {number} data.total_count
     */
    function renderList(data) {
        const contentArea = document.getElementById('content-area');
        // const {questions,total_count,current_page} = data;
        const total_count = data.total_count;
        const current_page = data.current_page;
        const questions = data.questions;
        const perPage = 3;
        const startNum = total_count - (current_page - 1) * perPage;


        if (questions.length === 0) {
            contentArea.innerHTML = '<p class="no-data">등록된 질문이 아직 없습니다.</p>';
            return;
        }

        let html = '<ul>';
        questions.forEach((question, index) => {
            const postNum = startNum - index;
            html += `
                <li>
                    <a href="/question/detail/${question.id}/">
                        <span class="post-num">${postNum}</span>
                        <span class="post-subject">${question.subject}</span>
                    </a>
                    <div class="action-btns">
                        <button class="edit-btn" onclick="openEditModal(${question.id}, '${question.subject}', '${question.content}')">
                            <span class="material-symbols-outlined">edit</span>
                        </button>
                        <button class="delete-btn" onclick="deleteQuestion(${question.id})">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                </li>`;
        });
        html += '</ul>';
        contentArea.innerHTML = html;
    }

    // 3. 페이지네이션 버튼 렌더링
    function renderPagination(data) {
        const paginationArea = document.getElementById('pagination-area');
        const totalPages = data.total_pages;
        const currentPage = data.current_page;

        if (totalPages <= 1) { // 페이지가 1개뿐이면 버튼 안 보임
            paginationArea.innerHTML = '';
            return;
        }

        let html = '';

        html += `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''}
                    onclick="loadQuestions(${currentPage - 1})"> < </button>`;

        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}"
                        onclick="loadQuestions(${i})">${i}</button>`;
        }

        html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''}
                    onclick="loadQuestions(${currentPage + 1})"> > </button>`;

        paginationArea.innerHTML = html;
    }


    // 등록 기능
    async function createQuestion() {
        const subject = document.getElementById('subject').value;
        const content = document.getElementById('content').value;

        if(!subject || !content) { alert("내용을 입력해주세요."); return; }

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subject, content })
            });

            if (response.ok) {
                closeModal(); // 등록 성공 시 모달 닫기
                await loadQuestions(); // 목록 새로고침
            }
        } catch (error) {
            console.error("등록 중 오류:", error);
        }
    }


    // 수정 기능
    async function updateQuestion() {
        const id = document.getElementById('edit-id').value;
        const subject = document.getElementById('edit-subject').value;
        const content = document.getElementById('edit-content').value;

        try {
            const response = await fetch(`${API_URL}${id}/`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ subject, content })
            });

            if (response.ok) {
                closeModal();
                await loadQuestions(); // 목록 새로고침
            }
        } catch (error) {
            console.error("수정 실패:", error);
        }
    }

    // 삭제 기능
    async function deleteQuestion(questionId) {
        if (!confirm("이 게시글을 삭제하시겠습니까?")) return;

        try {
            // 주소 형식: /question/1/ (백엔드 @bp.route('/<int:question_id>/') 에 대응)
            const response = await fetch(`${API_URL}${questionId}/`, {
                method: 'DELETE'
            });

            if (response.ok) {
                alert("삭제되었습니다.");
                await loadQuestions();
            } else {
                alert("삭제에 실패했습니다.");
            }
        } catch (error) {
            console.error("삭제 중 오류 발생:", error);
        }
    }

    loadQuestions();
</script>

<script>
        // 수정 모달 열기 (기존 데이터 채우기)
    function openEditModal(id, subject, content) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-subject').value = subject;
        document.getElementById('edit-content').value = content;
        document.getElementById('editModal').style.display = 'block';
    }

        // 등록 모달 열기
    function openCreateModal() {
        document.getElementById('subject').value = '';
        document.getElementById('content').value = '';
        document.getElementById('createModal').style.display = 'block';
    }

        // 모달 닫기
    function closeModal() {
        document.getElementById('editModal').style.display = 'none';
        document.getElementById('createModal').style.display = 'none';
    }
</script>


</body>
</html>
