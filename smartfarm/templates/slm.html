{% extends "base.html" %}

{% block content %}
<style>
  body { overflow: hidden !important; }
  footer { display: none !important; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<div style="position:fixed; top:64px; left:0; right:0; bottom:0; background:#f8fafc; z-index:40;">
  <div class="container mx-auto" style="height:100%; display:flex; flex-direction:column; background:white; border-left:1px solid #e2e8f0; border-right:1px solid #e2e8f0;">

    <!-- 상단 바 -->
    <div style="background:white; border-bottom:1px solid #e2e8f0; padding:8px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span id="status-dot" style="width:8px; height:8px; background:#6366f1; border-radius:50%; display:inline-block; animation:pulse 2s infinite;"></span>
        <span style="font-size:0.875rem; font-weight:700; color:#475569;">tomAI Chat</span>
        <span style="font-size:0.75rem; color:#94a3b8;">5-Core SLM</span>
      </div>
      <a href="/" style="display:flex; align-items:center; gap:5px; font-size:0.8rem; font-weight:600; color:#94a3b8; border:1px solid #e2e8f0; padding:5px 12px; border-radius:8px; text-decoration:none; transition:all .15s;"
        onmouseover="this.style.color='#ef4444';this.style.borderColor='#fca5a5';"
        onmouseout="this.style.color='#94a3b8';this.style.borderColor='#e2e8f0';">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        채팅 종료
      </a>
    </div>

    <!-- 메시지 영역 -->
    <div id="messages" style="flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:12px; background:#f8fafc;">
      <div style="display:flex; justify-content:flex-start;">
        <div style="background:white; border-radius:16px 16px 16px 4px; padding:12px 16px; font-size:0.875rem; color:#334155; box-shadow:0 1px 4px rgba(0,0,0,0.07); max-width:80%; line-height:1.65;">
          안녕하세요! tomAI입니다.<br>
          번역·감성 분석·개체명 인식·질문 답변 등 다양한 요청을 처리할 수 있어요.
        </div>
      </div>
    </div>

    <!-- 입력 영역 -->
    <div style="background:white; border-top:1px solid #e2e8f0; padding:12px 16px; display:flex; flex-direction:column; gap:8px; flex-shrink:0;">

      <!-- 문서 업로드 바 -->
      <div id="doc-bar" style="display:flex; flex-direction:column; gap:6px;">
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <input type="file" id="doc-file" accept=".pdf,.docx,.doc,.txt" style="display:none;" onchange="uploadDoc(this)">
          <button onclick="document.getElementById('doc-file').click()"
            style="display:flex; align-items:center; gap:6px; padding:6px 12px; border:1px dashed #c7d2fe; border-radius:10px; background:#f5f3ff; color:#6366f1; font-size:0.78rem; font-weight:600; cursor:pointer; transition:all .15s; white-space:nowrap;"
            onmouseover="this.style.background='#ede9fe';" onmouseout="this.style.background='#f5f3ff';">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            문서 업로드
          </button>
          <button id="link-toggle-btn" onclick="toggleUrlInput()"
            style="display:flex; align-items:center; gap:6px; padding:6px 12px; border:1px dashed #bae6fd; border-radius:10px; background:#f0f9ff; color:#0284c7; font-size:0.78rem; font-weight:600; cursor:pointer; transition:all .15s; white-space:nowrap;"
            onmouseover="this.style.background='#e0f2fe';" onmouseout="this.style.background='#f0f9ff';">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
            문서 링크
          </button>
          <div id="doc-status" style="font-size:0.78rem; color:#94a3b8; display:flex; align-items:center; gap:6px;"><span id="doc-hint">문서(PDF·DOCX·TXT)를 업로드하면 내용을 읽고 질문에 답할 수 있어요.</span></div>
          <button id="doc-clear" onclick="clearDoc()" style="display:none; margin-left:auto; font-size:0.75rem; color:#94a3b8; background:none; border:none; cursor:pointer; padding:4px 8px; border-radius:6px;"
            onmouseover="this.style.color='#ef4444';" onmouseout="this.style.color='#94a3b8';">✕ 제거</button>
        </div>
        <!-- URL 입력 행 (기본 숨김) -->
        <div id="url-row" style="display:none; align-items:center; gap:6px;">
          <input id="url-input" type="url" placeholder="https://docs.google.com/document/d/... 또는 웹페이지 URL"
            style="flex:1; background:#f8fafc; border:1px solid #bae6fd; border-radius:10px; padding:7px 12px; font-size:0.78rem; outline:none; transition:border-color .15s; min-width:0;"
            onfocus="this.style.borderColor='#0284c7';" onblur="this.style.borderColor='#bae6fd';">
          <button onclick="fetchDoc()"
            style="padding:6px 14px; border:none; border-radius:10px; background:#0284c7; color:white; font-size:0.78rem; font-weight:600; cursor:pointer; white-space:nowrap; transition:background .15s;"
            onmouseover="this.style.background='#0369a1';" onmouseout="this.style.background='#0284c7';">불러오기</button>
          <button onclick="toggleUrlInput()"
            style="padding:6px 10px; border:1px solid #e2e8f0; border-radius:10px; background:white; color:#94a3b8; font-size:0.78rem; cursor:pointer; white-space:nowrap;"
            onmouseover="this.style.color='#334155';" onmouseout="this.style.color='#94a3b8';">취소</button>
        </div>
      </div>

      <!-- context 값 보관용 hidden input -->
      <input type="hidden" id="context-input">

      <div style="display:flex; gap:10px; align-items:center;">
        <input id="chat-input" type="text" placeholder="무엇이든 질문하거나 번역·분석을 요청해 보세요"
          style="flex:1; background:#f8fafc; border:1px solid #e2e8f0; border-radius:24px; padding:10px 18px; font-size:0.875rem; outline:none; transition:border-color .15s;"
          onfocus="this.style.borderColor='#6366f1'; this.style.background='white';"
          onblur="this.style.borderColor='#e2e8f0'; this.style.background='#f8fafc';"
          autocomplete="off" />
        <button id="chat-send"
          style="width:40px; height:40px; background:#4f46e5; color:white; border:none; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .15s;"
          onmouseover="this.style.background='#4338ca';" onmouseout="this.style.background='#4f46e5';">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</div>

<script>
const SLM_URL = '/slm';
const msgs = document.getElementById('messages');
const input = document.getElementById('chat-input');
const ctxInput = document.getElementById('context-input');
let sending = false;
let currentES = null;

async function uploadDoc(fileInput) {
  const file = fileInput.files[0];
  if (!file) return;

  const status = document.getElementById('doc-status');
  const clearBtn = document.getElementById('doc-clear');
  status.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> 읽는 중...';

  const form = new FormData();
  form.append('file', file);

  try {
    const res = await fetch(SLM_URL + '/upload-doc', { method: 'POST', body: form });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '추출 실패');
    }
    const data = await res.json();
    ctxInput.value = data.doc_id;

    const info = [data.filename];
    if (data.pages) info.push(`${data.pages}p`);
    info.push(`${data.chars.toLocaleString()}자`);

    status.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span style="color:#334155; font-weight:600;">${info.join(' · ')}</span>`;
    clearBtn.style.display = 'inline-block';

    // 문서 로드 알림 메시지
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex; justify-content:flex-start;';
    wrap.innerHTML = `<div style="background:#f0fdf4; border:1px solid #bbf7d0; border-radius:16px 16px 16px 4px; padding:10px 14px; font-size:0.8rem; color:#166534; max-width:80%;">
      📄 <strong>${data.filename}</strong> 로드 완료 (${data.chars.toLocaleString()}자${data.pages ? ', ' + data.pages + '페이지' : ''})<br>
      <span style="color:#4ade80;">문서 내용에 대해 질문해 보세요.</span>
    </div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    input.focus();
  } catch (e) {
    status.innerHTML = `<span style="color:#ef4444;">⚠️ ${e.message}</span>`;
    ctxInput.value = '';
  }
  fileInput.value = '';
}

function clearDoc() {
  const id = ctxInput.value.trim();
  if (id) fetch(SLM_URL + "/doc/" + id, { method: "DELETE" }).catch(() => {});
  ctxInput.value = '';
  document.getElementById('doc-status').innerHTML = '<span id="doc-hint">문서(PDF·DOCX·TXT)를 업로드하면 내용을 읽고 질문에 답할 수 있어요.</span>';
  document.getElementById('doc-clear').style.display = 'none';
  document.getElementById('doc-file').value = '';
  document.getElementById('url-row').style.display = 'none';
  document.getElementById('url-input').value = '';
}

function toggleUrlInput() {
  const row = document.getElementById('url-row');
  const open = row.style.display === 'none';
  row.style.display = open ? 'flex' : 'none';
  if (open) document.getElementById('url-input').focus();
}

async function fetchDoc() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  const status = document.getElementById('doc-status');
  const clearBtn = document.getElementById('doc-clear');
  status.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0284c7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> 불러오는 중...';

  try {
    const res = await fetch(SLM_URL + '/fetch-doc', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.detail || '불러오기 실패');
    }
    const data = await res.json();
    ctxInput.value = data.doc_id;

    status.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      <span style="color:#334155; font-weight:600;">${data.filename} · ${data.chars.toLocaleString()}자</span>`;
    clearBtn.style.display = 'inline-block';

    document.getElementById('url-row').style.display = 'none';
    document.getElementById('url-input').value = '';

    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex; justify-content:flex-start;';
    wrap.innerHTML = `<div style="background:#f0f9ff; border:1px solid #bae6fd; border-radius:16px 16px 16px 4px; padding:10px 14px; font-size:0.8rem; color:#075985; max-width:80%;">
      🔗 <strong>${data.filename}</strong> 로드 완료 (${data.chars.toLocaleString()}자)<br>
      <span style="color:#38bdf8;">문서 내용에 대해 질문해 보세요.</span>
    </div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    input.focus();
  } catch (e) {
    status.innerHTML = `<span style="color:#ef4444;">⚠️ ${e.message}</span>`;
  }
}

const BADGE = {
  sentiment:   { label: '😊 감성 분석', bg: '#fff1f2', color: '#be123c', border: '#fecdd3' },
  ner:         { label: '🏷️ 개체명',   bg: '#fffbeb', color: '#92400e', border: '#fde68a' },
  translation: { label: '🌐 번역',      bg: '#f0f9ff', color: '#075985', border: '#bae6fd' },
  qna:         { label: '❓ QnA',       bg: '#f0fdf4', color: '#166534', border: '#bbf7d0' },
  text_gen:    { label: '✨ 텍스트 생성', bg: '#eef2ff', color: '#3730a3', border: '#c7d2fe' },
};

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(text) {
  const lines = escHtml(text).split('\n');
  const out = []; let inList = false;
  for (const line of lines) {
    const bm = line.match(/^\* (.+)/);
    if (bm) {
      if (!inList) { out.push('<ul style="margin:6px 0 6px 16px;padding:0;list-style:disc;">'); inList = true; }
      out.push('<li style="margin:2px 0;">' + bm[1].replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>') + '</li>');
    } else {
      if (inList) { out.push('</ul>'); inList = false; }
      out.push(line.trim() === '' ? '<br>' : line.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>') + '<br>');
    }
  }
  if (inList) out.push('</ul>');
  return out.join('').replace(/(<br>)+$/, '');
}

function addUserBubble(text) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex; justify-content:flex-end;';
  const bubble = document.createElement('div');
  bubble.style.cssText = 'max-width:75%; padding:12px 16px; font-size:0.875rem; line-height:1.65; word-break:break-word; background:#4f46e5; color:white; border-radius:16px 16px 4px 16px; box-shadow:0 1px 4px rgba(0,0,0,0.1);';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function addResponseCard() {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex; justify-content:flex-start;';
  const card = document.createElement('div');
  card.style.cssText = 'background:white; border-radius:16px 16px 16px 4px; padding:14px 16px; font-size:0.875rem; color:#334155; box-shadow:0 1px 4px rgba(0,0,0,0.07); max-width:85%; display:flex; flex-direction:column; gap:10px;';

  // 파이프라인 배지 행
  const badgeRow = document.createElement('div');
  badgeRow.id = 'badge-row-' + Date.now();
  badgeRow.style.cssText = 'display:flex; flex-wrap:wrap; gap:6px; min-height:24px;';
  card.appendChild(badgeRow);

  // 파이프라인 결과 영역
  const results = document.createElement('div');
  results.style.cssText = 'display:flex; flex-direction:column; gap:6px;';
  card.appendChild(results);

  // 최종 답변 영역
  const answer = document.createElement('div');
  answer.style.cssText = 'display:none; line-height:1.65; word-break:break-word; border-top:1px solid #f1f5f9; padding-top:10px; margin-top:2px;';
  card.appendChild(answer);

  wrap.appendChild(card);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return { badgeRow, results, answer };
}

function makeBadge(p, active) {
  const info = BADGE[p] || { label: p, bg: '#f8fafc', color: '#64748b', border: '#e2e8f0' };
  const span = document.createElement('span');
  span.id = 'badge-' + p;
  span.style.cssText = `display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:0.72rem; font-weight:600; background:${info.bg}; color:${info.color}; border:1px solid ${info.border}; opacity:${active ? '1' : '0.35'}; transition:opacity .3s;`;
  span.textContent = info.label;
  return span;
}

function renderPipelineResult(container, pipeline, value) {
  const info = BADGE[pipeline] || { label: pipeline, bg: '#f8fafc', color: '#64748b', border: '#e2e8f0' };
  const box = document.createElement('div');
  box.style.cssText = `background:${info.bg}; border:1px solid ${info.border}; border-radius:10px; padding:8px 12px; font-size:0.8rem;`;

  let inner = '';
  if (pipeline === 'sentiment') {
    const emoji = value.label === '긍정' ? '😊' : value.label === '부정' ? '😞' : '😐';
    inner = `<span style="font-size:1.1rem;">${emoji}</span> <strong style="color:${info.color};">${value.label}</strong> <span style="color:#94a3b8; font-size:0.75rem;">신뢰도 ${(value.score*100).toFixed(1)}%</span>`;
  } else if (pipeline === 'ner') {
    if (value.entities && value.entities.length) {
      inner = value.entities.map(e =>
        `<span style="display:inline-flex; align-items:center; gap:4px; background:white; border:1px solid ${info.border}; border-radius:6px; padding:2px 8px; margin:2px; font-size:0.75rem;"><strong>${escHtml(e.text)}</strong><span style="color:#94a3b8;">${e.type}</span></span>`
      ).join('');
    } else {
      inner = '<span style="color:#94a3b8;">감지된 개체 없음</span>';
    }
  } else if (pipeline === 'translation') {
    const arrow = value.direction === 'ko_en' ? '한→영' : '영→한';
    inner = `<span style="color:#94a3b8; font-size:0.72rem; margin-right:6px;">${arrow}</span>${escHtml(value.translated)}`;
  } else if (pipeline === 'qna') {
    inner = value.answer
      ? `<strong style="color:${info.color};">${escHtml(value.answer)}</strong>`
      : '<span style="color:#94a3b8;">답변 없음</span>';
  } else {
    inner = `<pre style="font-size:0.72rem; color:#64748b; white-space:pre-wrap;">${escHtml(JSON.stringify(value, null, 2))}</pre>`;
  }

  box.innerHTML = `<span style="font-size:0.72rem; color:#94a3b8; font-weight:600; display:block; margin-bottom:4px;">${info.label}</span>${inner}`;
  container.appendChild(box);
}

function addTyping() {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex; justify-content:flex-start;';
  wrap.innerHTML = `<div style="background:white;border-radius:16px 16px 16px 4px;padding:14px 18px;box-shadow:0 1px 4px rgba(0,0,0,0.07);display:flex;gap:5px;align-items:center;">
    <span style="width:7px;height:7px;background:#a5b4fc;border-radius:50%;animation:blink 1.2s infinite 0s;display:inline-block;"></span>
    <span style="width:7px;height:7px;background:#a5b4fc;border-radius:50%;animation:blink 1.2s infinite .2s;display:inline-block;"></span>
    <span style="width:7px;height:7px;background:#a5b4fc;border-radius:50%;animation:blink 1.2s infinite .4s;display:inline-block;"></span>
  </div>`;
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
  return wrap;
}

function doSend() {
  const text = input.value.trim();
  if (!text || sending) return;
  if (currentES) { currentES.close(); currentES = null; }

  sending = true;
  input.value = '';
  const docId = ctxInput.value.trim();

  addUserBubble(text);
  const typing = addTyping();

  const params = new URLSearchParams({ text });
  if (docId) params.set("doc_id", docId);

  const es = new EventSource(SLM_URL + '/chat/stream?' + params);
  currentES = es;

  let responseCard = null;

  es.onmessage = (e) => {
    if (e.data === '[DONE]') {
      es.close(); currentES = null;
      sending = false;
      input.focus();
      return;
    }
    const msg = JSON.parse(e.data);

    if (msg.type === 'pipelines') {
      typing.remove();
      responseCard = addResponseCard();
      msg.value.forEach(p => responseCard.badgeRow.appendChild(makeBadge(p, false)));
    } else if (msg.type === 'status') {
      const pipe = msg.value.split(' ')[0];
      const badge = document.getElementById('badge-' + pipe);
      if (badge) badge.style.opacity = '1';
    } else if (msg.type === 'pipeline_result') {
      if (responseCard) renderPipelineResult(responseCard.results, msg.pipeline, msg.value);
      const badge = document.getElementById('badge-' + msg.pipeline);
      if (badge) badge.style.opacity = '1';
    } else if (msg.type === 'token') {
      if (responseCard) {
        responseCard.answer.style.display = 'block';
        responseCard.answer.innerHTML += escHtml(msg.value).replace(/\n/g, '<br>');
      }
      msgs.scrollTop = msgs.scrollHeight;
    }
  };

  es.onerror = () => {
    typing.remove();
    es.close(); currentES = null;
    sending = false;
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex; justify-content:flex-start;';
    wrap.innerHTML = `<div style="background:#fff1f2; border:1px solid #fecdd3; border-radius:16px 16px 16px 4px; padding:12px 16px; font-size:0.875rem; color:#be123c;">⚠️ SLM 서버에 연결할 수 없습니다.</div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  };
}

document.getElementById('chat-send').addEventListener('click', doSend);
window.addEventListener('beforeunload', () => { const id = ctxInput.value.trim(); if (id) fetch(SLM_URL + '/doc/' + id, { method: 'DELETE', keepalive: true }); });
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); doSend(); }
});
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); fetchDoc(); }
});
</script>
{% endblock %}
